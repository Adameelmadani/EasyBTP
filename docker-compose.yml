services:
  db:
    image: postgres:16-alpine
    container_name: easybtp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: easybtp
      POSTGRES_PASSWORD: easybtp
      POSTGRES_DB: easybtp
    ports:
      - "5432:5432"
    volumes:
      - easybtp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybtp -d easybtp"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: easybtp_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  easybtp_pgdata:
