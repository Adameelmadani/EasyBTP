services:
  db:
    image: postgres:16-alpine
    container_name: viabtp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: viabtp
      POSTGRES_PASSWORD: viabtp
      POSTGRES_DB: viabtp
    ports:
      - "5432:5432"
    volumes:
      - viabtp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viabtp -d viabtp"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: viabtp_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  viabtp_pgdata:
